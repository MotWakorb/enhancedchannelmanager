name: Build and Push Docker Image

on:
  push:
    branches:
      - main
      - dev
    paths-ignore:
      - '.beads/**'
      - '**.md'
  pull_request:
    branches:
      - main
      - dev
    paths-ignore:
      - '.beads/**'
      - '**.md'

env:
  REGISTRY: ghcr.io

jobs:
  # Security scanning jobs - run on pushes to main and PRs to main
  security-scan-frontend:
    name: Frontend Security Scan
    runs-on: ubuntu-latest
    if: (github.event_name == 'push' && github.ref == 'refs/heads/main') || (github.event_name == 'pull_request' && github.base_ref == 'main')
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Run npm audit
        working-directory: frontend
        run: npm audit --audit-level=high

  security-scan-backend:
    name: Backend Security Scan
    runs-on: ubuntu-latest
    if: (github.event_name == 'push' && github.ref == 'refs/heads/main') || (github.event_name == 'pull_request' && github.base_ref == 'main')
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install pip-audit
        run: pip install pip-audit

      - name: Run pip-audit
        working-directory: backend
        # PYSEC-2024-48: aiohttp (no fix available for our version range)
        # CVE-2024-23342: ecdsa timing attack - transitive dep via python-jose,
        #   unused (cryptography backend handles actual signing), no fix planned
        run: pip-audit -r requirements.txt --ignore-vuln PYSEC-2024-48 --ignore-vuln CVE-2024-23342

  codeql-analysis:
    name: CodeQL Analysis
    runs-on: ubuntu-latest
    if: (github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/dev')) || (github.event_name == 'pull_request' && (github.base_ref == 'main' || github.base_ref == 'dev'))
    permissions:
      security-events: write
      contents: read
    strategy:
      fail-fast: false
      matrix:
        language: ['javascript-typescript', 'python']
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          queries: security-and-quality
          config-file: .github/codeql/codeql-config.yml

      - name: Autobuild
        uses: github/codeql-action/autobuild@v4

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:${{ matrix.language }}"

      # ADR-005 Phase 3b: delta-zero enforcement.
      # Fails the job on any PR that has open HIGH/CRITICAL CodeQL alerts.
      # PR-only — push events are post-merge scans of already-reviewed code
      # and gating them would block everyone on transient alerts.
      # Code Scanning "merge protection rules" aren't available for our custom
      # CodeQL setup, so we enforce delta-zero in the workflow itself and
      # make this job a required status check.
      - name: Enforce CodeQL delta-zero (fail on open HIGH/CRITICAL)
        if: github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          LANGUAGE: ${{ matrix.language }}
        run: |
          set -euo pipefail

          # Code Scanning alerts API requires the PR merge ref form for
          # PR-scoped queries — raw SHA or refs/heads/<branch> returns 0
          # even when alerts exist. See:
          # https://docs.github.com/en/rest/code-scanning/code-scanning#list-code-scanning-alerts-for-a-repository
          REF="refs/pull/${PR_NUMBER}/merge"
          echo "Checking CodeQL alerts on ref=$REF (PR #${PR_NUMBER}, language=${LANGUAGE})"

          # Two sources of eventual-consistency between codeql-action/analyze
          # and the alerts view:
          #  (1) On a NEW PR, after the first scan: alerts-API lags the
          #      analyses endpoint. Poll for them to appear.
          #  (2) On a SUBSEQUENT push that FIXES alerts: alerts-API keeps
          #      returning stale alerts from the prior scan. These stale
          #      alerts carry a `most_recent_instance.commit_sha` that
          #      points to the PREVIOUS merge commit, not the current one.
          #
          # Solution: pin on the latest analysis commit_sha from the
          # analyses endpoint (which updates instantly on SARIF upload),
          # then filter alerts to only those whose
          # `most_recent_instance.commit_sha` matches that pin. Stale
          # alerts from prior scans are ignored; new alerts are trusted
          # only once the analysis pin is current.
          #
          # Poll schedule: up to 6 attempts at 10/20/30/45/60/60s waits
          # (~4min total). Break early as soon as analyses on the CURRENT
          # merge commit exist for our language (proof the API has caught
          # up) AND we can filter alerts to that commit.
          ATTEMPTS=6
          WAITS=(10 20 30 45 60 60)
          CURRENT_SHA=""
          PINNED_ALERTS='[]'

          CURRENT_RESULTS_COUNT=""
          for i in $(seq 0 $((ATTEMPTS - 1))); do
            ATTEMPT_NUM=$((i + 1))
            echo "Attempt ${ATTEMPT_NUM}/${ATTEMPTS}: checking analyses for ref=$REF, language=${LANGUAGE}"

            # Fetch the latest analysis for THIS language on this PR ref.
            # The analyses endpoint reflects SARIF uploads immediately —
            # unlike the alerts endpoint, which takes additional time to
            # update its ref-scoped view. Pinning to this commit_sha lets
            # us ignore stale alerts from prior scans.
            LATEST=$(gh api \
              "/repos/${{ github.repository }}/code-scanning/analyses?ref=${REF}&per_page=20" \
              | jq --arg lang "/language:${LANGUAGE}" \
                  '[.[] | select(.category==$lang)] | sort_by(.created_at) | reverse | .[0] // null')

            if [ "${LATEST}" != "null" ] && [ -n "${LATEST}" ]; then
              CURRENT_SHA=$(echo "${LATEST}" | jq -r '.commit_sha')
              CREATED_AT=$(echo "${LATEST}" | jq -r '.created_at')
              CURRENT_RESULTS_COUNT=$(echo "${LATEST}" | jq -r '.results_count')
              echo "  -> latest analysis for ${LANGUAGE}: commit=${CURRENT_SHA:0:10} created=${CREATED_AT} results=${CURRENT_RESULTS_COUNT}"
              echo "  -> analysis pin acquired; proceeding to alert check"
              break
            fi

            echo "  -> no analyses found yet for ${LANGUAGE}"

            if [ "${ATTEMPT_NUM}" -lt "${ATTEMPTS}" ]; then
              WAIT=${WAITS[$i]}
              echo "  -> sleeping ${WAIT}s before retry"
              sleep "${WAIT}"
            fi
          done

          if [ -z "${CURRENT_SHA}" ]; then
            echo "::error::Could not acquire a CodeQL analysis pin for language=${LANGUAGE} on ref=${REF} after ~4min. SARIF upload did not register. Failing closed."
            exit 1
          fi

          # Fast-path: if the analysis itself reports zero findings for
          # this commit, the scan was clean — no need to poll the alerts
          # endpoint (which could still be showing stale alerts from
          # prior scans).
          if [ "${CURRENT_RESULTS_COUNT}" = "0" ]; then
            echo "Delta-zero check passed: analysis on ${CURRENT_SHA:0:10} (${LANGUAGE}) reports 0 findings"
            exit 0
          fi

          # The analysis reported >0 findings. Now we need to check
          # severity. Poll the alerts endpoint filtered to alerts whose
          # most_recent_instance.commit_sha matches our pinned SHA.
          # Stale alerts (from prior scans on different commits) are
          # excluded automatically. On a fresh scan, alerts may lag the
          # analyses endpoint by ~30-60s before appearing.
          ALERT_ATTEMPTS=4
          ALERT_WAITS=(10 20 30 45)
          PINNED_ALERTS='[]'
          for j in $(seq 0 $((ALERT_ATTEMPTS - 1))); do
            A_NUM=$((j + 1))
            echo "Alert poll ${A_NUM}/${ALERT_ATTEMPTS}: querying alerts on ref=${REF} pinned to ${CURRENT_SHA:0:10}"
            RAW=$(gh api --paginate \
              "/repos/${{ github.repository }}/code-scanning/alerts?state=open&ref=${REF}&per_page=100" \
              | jq -s 'add // []')

            TOTAL_RAW=$(echo "$RAW" | jq 'length')
            PINNED_ALERTS=$(echo "$RAW" | jq --arg sha "${CURRENT_SHA}" \
              '[.[] | select(.most_recent_instance.commit_sha == $sha)]')
            PINNED_COUNT=$(echo "$PINNED_ALERTS" | jq 'length')

            echo "  -> alerts on ref: ${TOTAL_RAW} raw, ${PINNED_COUNT} pinned to current SHA"

            # We expect at least some pinned alerts because the analysis
            # said results_count > 0. Break as soon as they appear.
            if [ "${PINNED_COUNT}" -gt 0 ]; then
              echo "  -> pinned alerts visible; decision can be made"
              break
            fi

            if [ "${A_NUM}" -lt "${ALERT_ATTEMPTS}" ]; then
              WAIT=${ALERT_WAITS[$j]}
              echo "  -> zero pinned alerts despite analysis reporting ${CURRENT_RESULTS_COUNT}; sleeping ${WAIT}s"
              sleep "${WAIT}"
            fi
          done

          # Apply the HIGH/CRITICAL filter to pinned alerts only.
          HIGH_ALERTS=$(echo "$PINNED_ALERTS" | jq \
            '[.[] | select(.rule.security_severity_level=="high" or .rule.security_severity_level=="critical") | {number, rule: .rule.id, path: .most_recent_instance.location.path, severity: .rule.security_severity_level}]')
          HIGH_COUNT=$(echo "$HIGH_ALERTS" | jq 'length')

          echo "Final (language=${LANGUAGE}, pinned to commit ${CURRENT_SHA:0:10}): ${HIGH_COUNT} open HIGH/CRITICAL alerts"

          if [ "${HIGH_COUNT}" -gt 0 ]; then
            echo "::error::${HIGH_COUNT} open HIGH/CRITICAL CodeQL alerts on this PR:"
            echo "$HIGH_ALERTS" | jq -r '.[] | "- alert #\(.number) [\(.severity)] \(.rule) at \(.path)"'
            echo ""
            echo "Per ADR-005 Phase 1 dismissal policy, these must be either:"
            echo "  (a) remediated (the fix closes the finding)"
            echo "  (b) dismissed as false-positive with sanitizer evidence + test reference"
            echo "  (c) dismissed as test-only with test path reference"
            echo "See docs/adr/ADR-005-code-security-gating-strategy.md for full policy."
            exit 1
          fi

          echo "Delta-zero check passed: 0 open HIGH/CRITICAL alerts on ref=$REF (language=${LANGUAGE})"

  # IaC Security Scanning
  iac-security-scan:
    name: IaC Security Scan
    runs-on: ubuntu-latest
    if: (github.event_name == 'push' && github.ref == 'refs/heads/main') || (github.event_name == 'pull_request' && github.base_ref == 'main')
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Run Checkov IaC scanner
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: .
          framework: dockerfile,github_actions
          soft_fail: false
          output_format: cli
          download_external_modules: false
          # Skip CKV2_GHA_1 - CodeQL requires security-events:write permission
          # Skip CKV_DOCKER_3 - We use gosu in entrypoint to drop to non-root user after fixing volume permissions
          # Skip CKV_DOCKER_8 - Same reason, entrypoint starts as root then switches to appuser
          skip_check: CKV2_GHA_1,CKV_DOCKER_3,CKV_DOCKER_8

  # DAST - Dynamic Application Security Testing (loads image from build-amd64 cache)
  dast-scan:
    name: DAST Security Scan
    runs-on: ubuntu-latest
    if: (github.event_name == 'push' && github.ref == 'refs/heads/main') || (github.event_name == 'pull_request' && github.base_ref == 'main')
    needs: [build-amd64]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Extract version and set release channel
        id: version
        run: |
          VERSION=$(jq -r '.version' frontend/package.json)
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          if [[ "${{ github.ref }}" == "refs/heads/dev" ]]; then
            echo "channel=dev" >> $GITHUB_OUTPUT
          else
            echo "channel=latest" >> $GITHUB_OUTPUT
          fi

      - name: Load Docker image from build cache
        uses: docker/build-push-action@v7
        with:
          context: .
          load: true
          tags: ecm:dast-test
          platforms: linux/amd64
          build-args: |
            GIT_COMMIT=${{ github.sha }}
            ECM_VERSION=${{ steps.version.outputs.version }}
            RELEASE_CHANNEL=${{ steps.version.outputs.channel }}
          cache-from: type=gha,scope=amd64

      - name: Start application container
        run: |
          docker run -d --name ecm-dast -p 6100:6100 \
            -e DISPATCHARR_URL=http://localhost:9999 \
            ecm:dast-test

          # Wait for the app to be ready
          echo "Waiting for application to start..."
          READY=false
          for i in {1..30}; do
            if curl -sf http://localhost:6100/api/health > /dev/null 2>&1; then
              echo "✓ Application is ready!"
              READY=true
              break
            fi
            echo "Waiting... ($i/30)"
            sleep 2
          done

          # Fail if app never became ready
          if [ "$READY" = "false" ]; then
            echo "✗ Application failed to start within 60 seconds"
            echo "Container logs:"
            docker logs ecm-dast
            echo "Container status:"
            docker ps -a | grep ecm-dast
            exit 1
          fi

      - name: Verify application health
        run: |
          echo "Testing health endpoint..."
          HEALTH_RESPONSE=$(curl -s http://localhost:6100/api/health)
          echo "Health response: $HEALTH_RESPONSE"

          echo "Container status:"
          docker ps | grep ecm-dast

          echo "Recent container logs:"
          docker logs --tail 50 ecm-dast

      - name: Run OWASP ZAP Baseline Scan
        uses: zaproxy/action-baseline@v0.15.0
        with:
          target: 'http://localhost:6100'
          rules_file_name: '.zap/rules.tsv'
          allow_issue_writing: false
          # fail_action: false means only actual FAIL alerts fail the build
          # WARN alerts are logged but don't fail (appropriate for informational security headers)
          fail_action: false

      - name: Show container logs and stop
        if: always()
        run: |
          echo "Final container logs:"
          docker logs ecm-dast || true
          echo "Stopping container..."
          docker stop ecm-dast || true
          docker rm ecm-dast || true

  # Build AMD64 image natively
  build-amd64:
    name: Build Docker Image (AMD64)
    runs-on: ubuntu-latest
    # On PRs to main, wait for security scans; on dev branch pushes, run immediately
    needs: [security-scan-frontend, security-scan-backend, codeql-analysis, iac-security-scan]
    if: always() && (github.event_name != 'pull_request' || !contains(needs.*.result, 'failure'))
    permissions:
      contents: read
      packages: write
    outputs:
      digest: ${{ steps.build.outputs.digest }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set lowercase image name
        id: image
        run: echo "name=${GITHUB_REPOSITORY,,}" >> $GITHUB_OUTPUT

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ steps.image.outputs.name }}

      - name: Extract version and set release channel
        id: version
        run: |
          VERSION=$(jq -r '.version' frontend/package.json)
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          if [[ "${{ github.ref }}" == "refs/heads/dev" ]]; then
            echo "channel=dev" >> $GITHUB_OUTPUT
          else
            echo "channel=latest" >> $GITHUB_OUTPUT
          fi

      - name: Build and push (AMD64)
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64
          push: ${{ github.event_name != 'pull_request' }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            GIT_COMMIT=${{ github.sha }}
            ECM_VERSION=${{ steps.version.outputs.version }}
            RELEASE_CHANNEL=${{ steps.version.outputs.channel }}
          outputs: type=image,name=${{ env.REGISTRY }}/${{ steps.image.outputs.name }},push-by-digest=true,name-canonical=true,push=${{ github.event_name != 'pull_request' }}
          cache-from: type=gha,scope=amd64
          cache-to: type=gha,mode=max,scope=amd64

  # Container vulnerability scanning with Trivy (loads image from build-amd64 cache)
  trivy-scan:
    name: Container Security Scan (Trivy)
    runs-on: ubuntu-latest
    needs: [build-amd64]
    if: (github.event_name == 'push' && github.ref == 'refs/heads/main') || (github.event_name == 'pull_request' && github.base_ref == 'main')
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Extract version and set release channel
        id: version
        run: |
          VERSION=$(jq -r '.version' frontend/package.json)
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "channel=latest" >> $GITHUB_OUTPUT

      - name: Load Docker image from build cache
        uses: docker/build-push-action@v7
        with:
          context: .
          load: true
          tags: ecm-scan:latest
          platforms: linux/amd64
          build-args: |
            GIT_COMMIT=${{ github.sha }}
            ECM_VERSION=${{ steps.version.outputs.version }}
            RELEASE_CHANNEL=${{ steps.version.outputs.channel }}
          cache-from: type=gha,scope=amd64

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ecm-scan:latest
          format: 'table'
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'

  # Build ARM64 image natively on ARM runner (avoids QEMU emulation issues)
  build-arm64:
    name: Build Docker Image (ARM64)
    runs-on: ubuntu-24.04-arm
    # On PRs to main, wait for security scans; on dev branch pushes, run immediately
    needs: [security-scan-frontend, security-scan-backend, codeql-analysis, iac-security-scan]
    if: always() && (github.event_name != 'pull_request' || !contains(needs.*.result, 'failure'))
    permissions:
      contents: read
      packages: write
    outputs:
      digest: ${{ steps.build.outputs.digest }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set lowercase image name
        id: image
        run: echo "name=${GITHUB_REPOSITORY,,}" >> $GITHUB_OUTPUT

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ steps.image.outputs.name }}

      - name: Extract version and set release channel
        id: version
        run: |
          VERSION=$(jq -r '.version' frontend/package.json)
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          if [[ "${{ github.ref }}" == "refs/heads/dev" ]]; then
            echo "channel=dev" >> $GITHUB_OUTPUT
          else
            echo "channel=latest" >> $GITHUB_OUTPUT
          fi

      - name: Build and push (ARM64)
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            GIT_COMMIT=${{ github.sha }}
            ECM_VERSION=${{ steps.version.outputs.version }}
            RELEASE_CHANNEL=${{ steps.version.outputs.channel }}
          outputs: type=image,name=${{ env.REGISTRY }}/${{ steps.image.outputs.name }},push-by-digest=true,name-canonical=true,push=${{ github.event_name != 'pull_request' }}
          cache-from: type=gha,scope=arm64
          cache-to: type=gha,mode=max,scope=arm64

  # Container vulnerability scanning with Trivy — ARM64 (loads image from build-arm64 cache)
  trivy-scan-arm64:
    name: Container Security Scan (Trivy ARM64)
    runs-on: ubuntu-24.04-arm
    needs: [build-arm64]
    if: (github.event_name == 'push' && github.ref == 'refs/heads/main') || (github.event_name == 'pull_request' && github.base_ref == 'main')
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Extract version and set release channel
        id: version
        run: |
          VERSION=$(jq -r '.version' frontend/package.json)
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "channel=latest" >> $GITHUB_OUTPUT

      - name: Load Docker image from build cache
        uses: docker/build-push-action@v7
        with:
          context: .
          load: true
          tags: ecm-scan:latest
          platforms: linux/arm64
          build-args: |
            GIT_COMMIT=${{ github.sha }}
            ECM_VERSION=${{ steps.version.outputs.version }}
            RELEASE_CHANNEL=${{ steps.version.outputs.channel }}
          cache-from: type=gha,scope=arm64

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ecm-scan:latest
          format: 'table'
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'

  # Create multi-arch manifest by merging AMD64 and ARM64 images
  merge-manifests:
    name: Create Multi-Arch Manifest
    runs-on: ubuntu-latest
    needs: [build-amd64, build-arm64, trivy-scan, trivy-scan-arm64, dast-scan]
    if: >-
      always() && github.event_name != 'pull_request'
      && needs.build-amd64.result == 'success'
      && needs.build-arm64.result == 'success'
      && !contains(fromJSON('["failure","cancelled"]'), needs.trivy-scan.result)
      && !contains(fromJSON('["failure","cancelled"]'), needs.trivy-scan-arm64.result)
      && !contains(fromJSON('["failure","cancelled"]'), needs.dast-scan.result)
    permissions:
      contents: read
      packages: write

    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Checkout repository (for version extraction)
        uses: actions/checkout@v6

      - name: Set lowercase image name
        id: image
        run: echo "name=${GITHUB_REPOSITORY,,}" >> $GITHUB_OUTPUT

      - name: Extract version from package.json
        id: version
        run: |
          VERSION=$(jq -r '.version' frontend/package.json)
          echo "full=${VERSION}" >> $GITHUB_OUTPUT
          # Extract major.minor (e.g., 0.7 from 0.7.20080)
          echo "minor=$(echo $VERSION | cut -d. -f1,2)" >> $GITHUB_OUTPUT

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ steps.image.outputs.name }}
          tags: |
            # Branch name tag
            type=ref,event=branch
            # SHA tag for traceability
            type=sha,prefix={{branch}}-
            # Latest tag only on main branch
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            # Dev tag on dev branch
            type=raw,value=dev,enable=${{ github.ref == 'refs/heads/dev' }}
            # Semver tags with branch suffix on dev, plain on main
            type=raw,value=${{ steps.version.outputs.full }}-dev,enable=${{ github.ref == 'refs/heads/dev' }}
            type=raw,value=${{ steps.version.outputs.full }},enable=${{ github.ref == 'refs/heads/main' }}
            # Minor version tags (e.g., 0.7-dev or 0.7)
            type=raw,value=${{ steps.version.outputs.minor }}-dev,enable=${{ github.ref == 'refs/heads/dev' }}
            type=raw,value=${{ steps.version.outputs.minor }},enable=${{ github.ref == 'refs/heads/main' }}

      - name: Create manifest list and push
        working-directory: /tmp
        run: |
          docker buildx imagetools create \
            $(echo "${{ steps.meta.outputs.tags }}" | xargs -I {} echo --tag {}) \
            ${{ env.REGISTRY }}/${{ steps.image.outputs.name }}@${{ needs.build-amd64.outputs.digest }} \
            ${{ env.REGISTRY }}/${{ steps.image.outputs.name }}@${{ needs.build-arm64.outputs.digest }}

  # ─── MCP Server Build Pipeline ───────────────────────────────────────

  build-mcp-amd64:
    name: Build MCP Image (AMD64)
    runs-on: ubuntu-latest
    needs: [security-scan-backend]
    if: always() && (github.event_name != 'pull_request' || !contains(needs.*.result, 'failure'))
    permissions:
      contents: read
      packages: write
    outputs:
      digest: ${{ steps.build.outputs.digest }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set lowercase image name
        id: image
        run: echo "name=${GITHUB_REPOSITORY,,}-mcp" >> $GITHUB_OUTPUT

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ steps.image.outputs.name }}

      - name: Build and push MCP (AMD64)
        id: build
        uses: docker/build-push-action@v7
        with:
          context: ./mcp-server
          platforms: linux/amd64
          push: ${{ github.event_name != 'pull_request' }}
          labels: ${{ steps.meta.outputs.labels }}
          outputs: type=image,name=${{ env.REGISTRY }}/${{ steps.image.outputs.name }},push-by-digest=true,name-canonical=true,push=${{ github.event_name != 'pull_request' }}
          cache-from: type=gha,scope=mcp-amd64
          cache-to: type=gha,mode=max,scope=mcp-amd64

  build-mcp-arm64:
    name: Build MCP Image (ARM64)
    runs-on: ubuntu-24.04-arm
    needs: [security-scan-backend]
    if: always() && (github.event_name != 'pull_request' || !contains(needs.*.result, 'failure'))
    permissions:
      contents: read
      packages: write
    outputs:
      digest: ${{ steps.build.outputs.digest }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set lowercase image name
        id: image
        run: echo "name=${GITHUB_REPOSITORY,,}-mcp" >> $GITHUB_OUTPUT

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ steps.image.outputs.name }}

      - name: Build and push MCP (ARM64)
        id: build
        uses: docker/build-push-action@v7
        with:
          context: ./mcp-server
          platforms: linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          labels: ${{ steps.meta.outputs.labels }}
          outputs: type=image,name=${{ env.REGISTRY }}/${{ steps.image.outputs.name }},push-by-digest=true,name-canonical=true,push=${{ github.event_name != 'pull_request' }}
          cache-from: type=gha,scope=mcp-arm64
          cache-to: type=gha,mode=max,scope=mcp-arm64

  merge-mcp-manifests:
    name: Create MCP Multi-Arch Manifest
    runs-on: ubuntu-latest
    needs: [build-mcp-amd64, build-mcp-arm64]
    if: >-
      always() && github.event_name != 'pull_request'
      && needs.build-mcp-amd64.result == 'success'
      && needs.build-mcp-arm64.result == 'success'
    permissions:
      contents: read
      packages: write

    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Checkout repository (for version extraction)
        uses: actions/checkout@v6

      - name: Set lowercase image name
        id: image
        run: echo "name=${GITHUB_REPOSITORY,,}-mcp" >> $GITHUB_OUTPUT

      - name: Extract version from package.json
        id: version
        run: |
          VERSION=$(jq -r '.version' frontend/package.json)
          echo "full=${VERSION}" >> $GITHUB_OUTPUT
          echo "minor=$(echo $VERSION | cut -d. -f1,2)" >> $GITHUB_OUTPUT

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ steps.image.outputs.name }}
          tags: |
            type=ref,event=branch
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=raw,value=dev,enable=${{ github.ref == 'refs/heads/dev' }}
            type=raw,value=${{ steps.version.outputs.full }}-dev,enable=${{ github.ref == 'refs/heads/dev' }}
            type=raw,value=${{ steps.version.outputs.full }},enable=${{ github.ref == 'refs/heads/main' }}
            type=raw,value=${{ steps.version.outputs.minor }}-dev,enable=${{ github.ref == 'refs/heads/dev' }}
            type=raw,value=${{ steps.version.outputs.minor }},enable=${{ github.ref == 'refs/heads/main' }}

      - name: Create manifest list and push
        working-directory: /tmp
        run: |
          docker buildx imagetools create \
            $(echo "${{ steps.meta.outputs.tags }}" | xargs -I {} echo --tag {}) \
            ${{ env.REGISTRY }}/${{ steps.image.outputs.name }}@${{ needs.build-mcp-amd64.outputs.digest }} \
            ${{ env.REGISTRY }}/${{ steps.image.outputs.name }}@${{ needs.build-mcp-arm64.outputs.digest }}
