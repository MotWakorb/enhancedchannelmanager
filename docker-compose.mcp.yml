services:
  # MCP server — exposes ECM tools for Claude Desktop/Code
  ecm-mcp:
    build:
      context: ./mcp-server
      dockerfile: Dockerfile
    ports:
      - "${MCP_PORT:-6101}:${MCP_PORT:-6101}"
    volumes:
      - ecm-config:/config:ro
    environment:
      - CONFIG_DIR=/config
      - ECM_URL=http://ecm:${ECM_PORT:-6100}
      - MCP_PORT=${MCP_PORT:-6101}
    depends_on:
      ecm:
        condition: service_healthy
    restart: unless-stopped

volumes:
  ecm-config:
